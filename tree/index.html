<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GTD Horizon Tree</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bg:#fff; --fg:#1f2328; --line:#c4c9d0; --edge:#b3b9c2; --hl:#e5484d; --lbl:#6b7280; --panel:#f6f7f9;
    --k-value:#7c3aed; --k-vision:#4f46e5; --k-goal:#2563eb; --k-project:#0d9488; --k-task:#475569; --k-bucket:#9ca3af;
    --divider:rgba(15,23,42,.30);
    --band0:rgba(124,58,237,.14); --band1:rgba(79,70,229,.13); --band2:rgba(37,99,235,.13); --band3:rgba(13,148,136,.14); --band4:rgba(71,85,105,.09);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#191b1f; --fg:#e6e6e6; --line:#454b52; --edge:#525963; --hl:#ff6369; --lbl:#9aa0a6; --panel:#23262b;
      --k-value:#a78bfa; --k-vision:#818cf8; --k-goal:#60a5fa; --k-project:#2dd4bf; --k-task:#94a3b8; --k-bucket:#6b7280;
      --divider:rgba(255,255,255,.34);
      --band0:rgba(167,139,250,.22); --band1:rgba(129,140,248,.19); --band2:rgba(96,165,250,.17); --band3:rgba(45,212,191,.17); --band4:rgba(148,163,184,.12); }
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font:13px/1.4 system-ui,sans-serif; color:var(--fg); background:var(--bg); overflow:hidden; }
  #app{ height:100vh; min-height:520px; display:flex; flex-direction:column; }
  #bar{ flex:0 0 38px; z-index:20; display:flex; align-items:center; gap:8px;
    padding:0 10px; background:var(--panel); border-bottom:1px solid var(--line); }
  #bar button{ font:inherit; padding:3px 8px; border:1px solid var(--line); background:var(--bg); color:var(--fg); border-radius:5px; cursor:pointer; }
  #crumb{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--lbl); }
  #crumb b{ color:var(--fg); }
  #viewport{ flex:1 1 auto; min-height:0; position:relative; overflow:hidden; cursor:grab; }
  #viewport.drag{ cursor:grabbing; }
  #pan{ position:absolute; transform-origin:0 0; }
  #bands{ position:absolute; left:0; top:0; z-index:0; }
  .band{ position:absolute; left:0; }
  .band .fill{ position:absolute; inset:0; }
  .band .divider{ position:absolute; left:0; right:0; top:0; border-top:3px solid var(--divider); }
  .band .blabel{ position:absolute; left:0; top:0; bottom:0; width:84px; display:flex; align-items:center; justify-content:center;
    writing-mode:vertical-rl; transform:rotate(180deg); font-size:15px; font-weight:800; letter-spacing:.2em;
    text-transform:uppercase; color:#fff; background:var(--k); }
  .band0 .blabel{--k:var(--k-value)} .band1 .blabel{--k:var(--k-vision)} .band2 .blabel{--k:var(--k-goal)}
  .band3 .blabel{--k:var(--k-project)} .band4 .blabel{--k:var(--k-task)}
  #edges{ position:absolute; left:0; top:0; z-index:1; pointer-events:none; overflow:visible; }
  #edges path{ fill:none; stroke:var(--edge); stroke-width:1.5; }
  #edges path.hl{ stroke:var(--hl); stroke-width:2.5; }
  #nodes{ position:absolute; left:0; top:0; z-index:2; }
  .node{ position:absolute; display:flex; flex-direction:column; align-items:center; gap:1px; padding:5px 8px;
    border:1.5px solid var(--k); border-top-width:4px; border-radius:8px; background:var(--bg); cursor:pointer; text-align:center; }
  .node .kind{ font-size:8.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--k); font-weight:700; }
  .node .label{ font-weight:600; font-size:12px; word-break:break-word; line-height:1.2; }
  .node .sub{ display:flex; gap:4px; flex-wrap:wrap; justify-content:center; margin-top:2px; }
  .chip{ font-size:9.5px; padding:0 6px; border-radius:9px; background:var(--panel); color:var(--lbl); }
  .chip.area{ background:color-mix(in srgb, var(--k-project) 22%, transparent); color:var(--k-project); }
  .caret{ position:absolute; top:-9px; right:-9px; width:17px; height:17px; line-height:15px; border:1px solid var(--line);
    border-radius:50%; background:var(--bg); font-size:11px; text-align:center; z-index:3; }
  .k-value{--k:var(--k-value)} .k-vision{--k:var(--k-vision)} .k-goal{--k:var(--k-goal)}
  .k-project{--k:var(--k-project)} .k-task{--k:var(--k-task)} .k-bucket{--k:var(--k-bucket); border-style:dashed; }
  .node.ph{ border-style:dashed; opacity:.6; background:transparent; }
  .node.ph .label{ font-weight:500; font-style:italic; color:var(--lbl); }
  .dim .node{ opacity:.35; } .dim .node.onpath{ opacity:1; }
  .node.onpath{ box-shadow:0 0 0 2px var(--hl); }
  .st{ font-size:9.5px; padding:0 6px; border-radius:9px; color:#fff; }
  .st-inbox{background:#8b8f96}.st-todo{background:#3b82f6}.st-inprogress{background:#f59e0b}
  .st-waiting{background:#a855f7}.st-someday{background:#6b7280}.st-done{background:#22c55e}
  #empty{ position:fixed; top:60px; left:20px; color:var(--lbl); }
  .menu{ position:fixed; z-index:50; background:var(--bg); border:1px solid var(--line); border-radius:8px;
    box-shadow:0 6px 24px rgba(0,0,0,.4); padding:4px; min-width:200px; font-size:13px; }
  .menu .mhead{ padding:5px 10px 7px; color:var(--lbl); font-size:11px; border-bottom:1px solid var(--line); margin-bottom:4px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:240px; }
  .menu button{ display:block; width:100%; text-align:left; background:none; border:0; color:var(--fg); padding:7px 10px; border-radius:6px; cursor:pointer; font:inherit; }
  .menu button:hover{ background:var(--panel); }
  .menu button:disabled{ color:var(--lbl); opacity:.45; cursor:default; }
  .menu button:disabled:hover{ background:none; }
  .menu button .t{ color:var(--lbl); font-size:11px; }
  .modal{ position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; }
  .modal .box{ background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:16px; width:340px; box-shadow:0 12px 44px rgba(0,0,0,.45); }
  .modal .mt{ font-weight:600; margin-bottom:10px; }
  .modal input{ width:100%; padding:8px 9px; border:1px solid var(--line); border-radius:6px; background:var(--panel); color:var(--fg); font:inherit; }
  .modal .row{ display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
  .modal .row button{ font:inherit; padding:6px 13px; border:1px solid var(--line); border-radius:6px; background:var(--bg); color:var(--fg); cursor:pointer; }
  .modal .row button.pri{ background:var(--k-goal); border-color:var(--k-goal); color:#fff; }
  [hidden]{ display:none !important; }
</style>
</head>
<body>
<div id="app">
<div id="bar">
  <button id="fit">Fit</button><button id="zin">＋</button><button id="zout">－</button>
  <button id="expand">Expand all</button><button id="collapse">Collapse tasks</button>
  <button id="clear">Clear trace</button>
  <span id="crumb">Click any node to trace it up to its root Value.</span>
  <button id="refresh">↻</button>
</div>
<div id="viewport"><div id="pan">
  <div id="bands"></div>
  <svg id="edges"></svg>
  <div id="nodes"></div>
</div></div>
</div>
<div id="empty">Loading…</div>
<div id="ctxmenu" class="menu" hidden></div>
<div id="promptModal" class="modal" hidden><div class="box">
  <div class="mt" id="promptTitle"></div>
  <input id="promptInput" placeholder="Name" autocomplete="off">
  <div class="row"><button id="promptCancel">Cancel</button><button id="promptOk" class="pri">Add</button></div>
</div></div>
<script>
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const toRows=c=>{const k=Object.keys(c),n=(c.id||[]).length,o=[];for(let i=0;i<n;i++){const r={};for(const x of k)r[x]=c[x][i];o.push(r);}return o;};
const stCls=s=>({ "Inbox":"st-inbox","To Do":"st-todo","In Progress":"st-inprogress","Waiting For":"st-waiting","Someday/Maybe":"st-someday","Done":"st-done" }[s]||"st-todo");

const TIER={ Value:0, Vision:1, Goal:2, Project:3, Task:4 };
const BANDS=[["Values",0],["Vision",1],["Goals",2],["Projects",3],["Actions",4]];
const NODE_W=132, NODE_H=56, GX=22, BAND_H=176, SUB_H=82, GUTTER=94, ROOT_GAP=1;

let ROOTS=[], collapsed=new Set(), uid=0, TBL={}, pending=null;

grist.ready({ requiredAccess:'full' });
grist.onRecords(()=>load());

async function load(){
  let values,vision,goals,areas,projects,tasks;
  try{
    [values,vision,goals,areas,projects,tasks]=await Promise.all(
      ['Values','Vision','Goals','Areas','Projects','Tasks'].map(t=>grist.docApi.fetchTable(t).then(toRows)));
  }catch(e){ document.getElementById('empty').textContent='Could not read tables: '+(e.message||e); return; }
  document.getElementById('empty').style.display='none';
  TBL={values,vision,goals,areas,projects,tasks};

  const areaName=id=>(areas.find(a=>a.id===id)||{}).Name||null;
  const N=(label,kind,extra)=>({uid:++uid,label,kind,children:[],parent:null,...extra});
  const link=(p,c)=>{ c.parent=p; p.children.push(c); return c; };

  const childTasksOf={}, rootTasksByProject={};
  for(const t of tasks){ if(t.Parent)(childTasksOf[t.Parent] ||= []).push(t); else (rootTasksByProject[t.Project||0] ||= []).push(t); }
  const buildTask=t=>{ const n=N(t.Title,"Task",{status:t.Status,dbid:t.id,projectId:t.Project||0,parentTaskId:t.Parent||0});
    (childTasksOf[t.id]||[]).sort((a,b)=>(a.Title||'').localeCompare(b.Title||'')).forEach(c=>link(n,buildTask(c))); return n; };
  const projByGoal={}; for(const p of projects)(projByGoal[p.Goal||0] ||= []).push(p);
  const buildProject=p=>{ const n=N(p.Name,"Project",{badge:p.Area?areaName(p.Area):null,dbid:p.id,goalId:p.Goal||0});
    (rootTasksByProject[p.id]||[]).sort((a,b)=>(a.Title||'').localeCompare(b.Title||'')).forEach(t=>link(n,buildTask(t))); return n; };
  const buildGoal=g=>{ const vaId=g.Value||(g.Vision?((vision.find(x=>x.id===g.Vision)||{}).Value||0):0);
    const n=N(g.Name,"Goal",{dbid:g.id,visionId:g.Vision||0,valueId:vaId}); (projByGoal[g.id]||[]).forEach(p=>link(n,buildProject(p))); return n; };
  const goalsByVision={}, goalsByValue={};
  for(const g of goals){ if(g.Vision)(goalsByVision[g.Vision] ||= []).push(g); else (goalsByValue[g.Value||0] ||= []).push(g); }
  const visionByValue={}; for(const v of vision)(visionByValue[v.Value||0] ||= []).push(v);
  const buildVision=v=>{ const n=N(v.Name,"Vision",{dbid:v.id,valueId:v.Value||0}); (goalsByVision[v.id]||[]).forEach(g=>link(n,buildGoal(g))); return n; };
  const PH=(kind,label)=>N(label,kind,{ph:true});
  const buildValue=val=>{ const n=N(val.Name,"Value",{dbid:val.id});
    (visionByValue[val.id]||[]).forEach(v=>link(n,buildVision(v)));
    const direct=goalsByValue[val.id]||[];
    if(direct.length){ const pv=PH("Vision","no vision set"); link(n,pv); direct.forEach(g=>link(pv,buildGoal(g))); }
    return n; };

  ROOTS=values.map(buildValue);
  // unfiled items still traverse every band, via a dashed "(Unassigned)" ladder — the full picture, gaps shown
  const up=(projByGoal[0]||[]), ut=(rootTasksByProject[0]||[]);
  if(up.length||ut.length){
    const uv=PH("Value","Unassigned"), uvis=PH("Vision","—"), ug=PH("Goal","no goal");
    link(uv,uvis); link(uvis,ug);
    up.forEach(p=>link(ug,buildProject(p)));
    if(ut.length){ const upj=PH("Project","no project"); link(ug,upj); ut.forEach(t=>link(upj,buildTask(t))); }
    ROOTS.push(uv);
  }
  render();
}

let CW=0, CH=0, maxAD=0;
function layout(){
  let leaf=0; maxAD=0;
  const CENTER=(BAND_H-NODE_H)/2;   // vertically center a node within its band
  const place=(node, ad)=>{
    node.tier = node.kind==='Bucket' ? node.tier : TIER[node.kind];
    node.ad = node.kind==='Task' ? ad : 0;
    if(node.kind==='Task') maxAD=Math.max(maxAD,ad);
    const kids = collapsed.has(node.uid) ? [] : node.children;
    if(kids.length){
      kids.forEach(k=> place(k, k.kind==='Task' ? (node.kind==='Task'?ad+1:0) : 0));
      node.x = (kids[0].x + kids[kids.length-1].x)/2;
    } else { node.x = GUTTER + leaf*(NODE_W+GX); leaf++; }
    node.y = node.kind==='Task' ? 4*BAND_H + CENTER + node.ad*SUB_H : node.tier*BAND_H + CENTER;
  };
  ROOTS.forEach(r=>{ place(r,0); leaf+=ROOT_GAP; });
  CW = GUTTER + leaf*(NODE_W+GX);
  CH = 4*BAND_H + CENTER + (maxAD+1)*SUB_H + 24;
}

function render(){
  layout();
  const bands=document.getElementById('bands'), edges=document.getElementById('edges'), nodes=document.getElementById('nodes');
  // bands
  let bh='';
  for(const [name,t] of BANDS){
    const top=t*BAND_H, h=(t<4)?BAND_H:(CH-4*BAND_H);
    bh+=`<div class="band band${t}" style="top:${top}px;width:${CW}px;height:${h}px">
      <div class="fill" style="background:var(--band${t})"></div>
      <div class="divider"></div><div class="blabel">${name}</div></div>`;
  }
  bands.innerHTML=bh; bands.style.width=CW+'px'; bands.style.height=CH+'px';
  // edges
  edges.setAttribute('width',CW); edges.setAttribute('height',CH); edges.setAttribute('viewBox',`0 0 ${CW} ${CH}`);
  const all=[]; (function walk(n){ all.push(n); if(!collapsed.has(n.uid)) n.children.forEach(walk); })({children:ROOTS,uid:-1});
  let ep='';
  for(const n of all){ if(n.uid===-1||!n.parent) continue;
    const px=n.parent.x+NODE_W/2, py=n.parent.y+NODE_H, cx=n.x+NODE_W/2, cy=n.y;
    const my=py+(cy-py)/2;
    ep+=`<path data-uid="${n.uid}" d="M${px},${py} V${my} H${cx} V${cy}"/>`;
  }
  edges.innerHTML=ep;
  // nodes
  let nh='';
  for(const n of all){ if(n.uid===-1) continue;
    let sub='';
    if(n.kind==='Task'&&n.status) sub+=`<span class="st ${stCls(n.status)}">${esc(n.status)}</span>`;
    if(n.badge) sub+=`<span class="chip area">${esc(n.badge)}</span>`;
    const hasKids=n.children.length>0;
    const caret=hasKids?`<span class="caret" data-uid="${n.uid}">${collapsed.has(n.uid)?'+':'–'}</span>`:'';
    nh+=`<div class="node k-${n.kind.toLowerCase()}${n.ph?' ph':''}" data-uid="${n.uid}" data-dbid="${n.dbid||''}" data-kind="${n.kind}" style="left:${n.x}px;top:${n.y}px;width:${NODE_W}px">
      ${caret}<span class="kind">${esc(n.kind)}</span>
      <span class="label">${esc(n.label)}</span>${sub?`<span class="sub">${sub}</span>`:''}</div>`;
  }
  nodes.innerHTML=nh; nodes.style.width=CW+'px'; nodes.style.height=CH+'px';
  fit();
  if(pending){ const el=document.querySelector(`.node[data-kind="${pending.kind}"][data-dbid="${pending.id}"]`);
    if(el){ const u=+el.dataset.uid; centerOn(byUid(u)); trace(u); }
    pending=null; }
}

// interactions (event delegation)
document.getElementById('nodes').addEventListener('click',e=>{
  const c=e.target.closest('.caret');
  if(c){ e.stopPropagation(); const u=+c.dataset.uid; collapsed.has(u)?collapsed.delete(u):collapsed.add(u); render(); return; }
  const nd=e.target.closest('.node'); if(nd) trace(+nd.dataset.uid);
});
const byUid=u=>{ let f=null; (function w(n){ if(n.uid===u)f=n; n.children&&n.children.forEach(w); })({children:ROOTS,uid:-1}); return f; };

/* ---- right-click: add nodes (hierarchy insert) ---- */
const KINDOF={Values:'Value',Vision:'Vision',Goals:'Goal',Projects:'Project',Tasks:'Task'};
const CHILDK={Value:'Vision',Vision:'Goal',Goal:'Project',Project:'Task',Task:'Task'};
const ABOVEK={Vision:'Value',Goal:'Vision',Project:'Goal'};
const menuEl=document.getElementById('ctxmenu');
function aboveKind(node){ if(node.kind==='Value')return null; if(node.kind==='Task')return node.parentTaskId?'Task':'Project'; return ABOVEK[node.kind]; }
document.getElementById('nodes').addEventListener('contextmenu',e=>{
  const nd=e.target.closest('.node'); if(!nd)return; e.preventDefault();
  const node=byUid(+nd.dataset.uid); if(!node||node.ph){ menuEl.hidden=true; return; }
  const below=CHILDK[node.kind], above=aboveKind(node), next=node.kind;
  const item=(w,k,l)=> k?`<button data-w="${w}">${l} <span class="t">→ ${k}</span></button>`:`<button disabled>${l} <span class="t">n/a</span></button>`;
  menuEl.innerHTML=`<div class="mhead">${esc(node.kind)}: ${esc(node.label)}</div>`
    +item('above',above,'Add Above')+item('below',below,'Add Below')+item('next',next,'Add Next To');
  menuEl.hidden=false;
  menuEl.style.left=Math.min(e.clientX, innerWidth-220)+'px';
  menuEl.style.top=Math.min(e.clientY, innerHeight-160)+'px';
  menuEl.querySelectorAll('button[data-w]').forEach(b=> b.onclick=ev=>{ ev.stopPropagation(); menuEl.hidden=true; startAdd(node,b.dataset.w); });
});
window.addEventListener('click',()=>{ menuEl.hidden=true; });

function askName(title,def){ return new Promise(res=>{
  const m=document.getElementById('promptModal'),t=document.getElementById('promptTitle'),inp=document.getElementById('promptInput'),
        ok=document.getElementById('promptOk'),cx=document.getElementById('promptCancel');
  t.textContent=title; inp.value=def; m.hidden=false; setTimeout(()=>{inp.focus();inp.select();},0);
  const done=v=>{ m.hidden=true; ok.onclick=cx.onclick=inp.onkeydown=null; res(v); };
  ok.onclick=()=>done(inp.value); cx.onclick=()=>done(null);
  inp.onkeydown=ev=>{ if(ev.key==='Enter')done(inp.value); else if(ev.key==='Escape')done(null); };
});}

async function startAdd(node,where){
  const kind = where==='below'?CHILDK[node.kind] : where==='next'?node.kind : aboveKind(node);
  const label = where==='above'?'Add Above':where==='below'?'Add Below':'Add Next To';
  const name = await askName(`${label} — new ${kind}`, `New ${kind}`);
  if(name==null) return;
  await doAdd(node, where, (name.trim()||('New '+kind)));
}

async function doAdd(node, where, name){
  let addTable, fields, upd=null;
  if(where==='below'){
    if(node.kind==='Value'){ addTable='Vision'; fields={Name:name, Value:node.dbid}; }
    else if(node.kind==='Vision'){ addTable='Goals'; fields={Name:name, Vision:node.dbid, Status:'Active'}; }
    else if(node.kind==='Goal'){ addTable='Projects'; fields={Name:name, Goal:node.dbid, Status:'Active'}; }
    else if(node.kind==='Project'){ addTable='Tasks'; fields={Title:name, Project:node.dbid, Status:'To Do'}; }
    else { addTable='Tasks'; fields={Title:name, Parent:node.dbid, Project:node.projectId, Status:'To Do'}; }
  } else if(where==='next'){
    if(node.kind==='Value'){ addTable='Values'; fields={Name:name}; }
    else if(node.kind==='Vision'){ addTable='Vision'; fields={Name:name, Value:node.valueId}; }
    else if(node.kind==='Goal'){ addTable='Goals'; fields=node.visionId?{Name:name,Vision:node.visionId,Status:'Active'}:{Name:name,Value:node.valueId,Status:'Active'}; }
    else if(node.kind==='Project'){ addTable='Projects'; fields={Name:name, Goal:node.goalId, Status:'Active'}; }
    else { addTable='Tasks'; fields={Title:name, Project:node.projectId, Parent:node.parentTaskId||0, Status:'To Do'}; }
  } else { // above: create parent, reparent this node under it
    if(node.kind==='Vision'){ addTable='Values'; fields={Name:name}; upd={table:'Vision', id:node.dbid, mk:v=>({Value:v})}; }
    else if(node.kind==='Goal'){ addTable='Vision'; fields={Name:name, Value:node.valueId}; upd={table:'Goals', id:node.dbid, mk:v=>({Vision:v, Value:0})}; }
    else if(node.kind==='Project'){ const g=(TBL.goals||[]).find(x=>x.id===node.goalId)||{}; addTable='Goals'; fields={Name:name, Vision:g.Vision||0, Value:g.Value||0, Status:'Active'}; upd={table:'Projects', id:node.dbid, mk:v=>({Goal:v})}; }
    else if(node.kind==='Task'){
      if(node.parentTaskId){ addTable='Tasks'; fields={Title:name, Parent:node.parentTaskId, Project:node.projectId, Status:'To Do'}; upd={table:'Tasks', id:node.dbid, mk:v=>({Parent:v})}; }
      else { const p=(TBL.projects||[]).find(x=>x.id===node.projectId)||{}; addTable='Projects'; fields={Name:name, Goal:p.Goal||0, Status:'Active'}; upd={table:'Tasks', id:node.dbid, mk:v=>({Project:v})}; }
    } else return;
  }
  try{
    const r=await grist.docApi.applyUserActions([['AddRecord', addTable, null, fields]]);
    const newId=r.retValues[0];
    if(upd) await grist.docApi.applyUserActions([['UpdateRecord', upd.table, upd.id, upd.mk(newId)]]);
    pending={kind:KINDOF[addTable], id:newId};
    await load();
  }catch(err){ document.getElementById('crumb').textContent='Add failed: '+(err.message||err); }
}
function centerOn(node){ const vr=vp.getBoundingClientRect(); tx=vr.width/2-(node.x+NODE_W/2)*scale; ty=vr.height/2-(node.y+NODE_H/2)*scale; apply(); }
function trace(u){
  const node=byUid(u); if(!node) return;
  document.querySelectorAll('.node.onpath').forEach(e=>e.classList.remove('onpath'));
  document.querySelectorAll('#edges path.hl').forEach(e=>e.classList.remove('hl'));
  const crumbs=[]; let cur=node;
  while(cur){ const el=document.querySelector(`.node[data-uid="${cur.uid}"]`); if(el)el.classList.add('onpath');
    const pe=document.querySelector(`#edges path[data-uid="${cur.uid}"]`); if(pe)pe.classList.add('hl');
    if(!cur.ph) crumbs.unshift(cur.label); cur=cur.parent; }
  document.getElementById('pan').classList.add('dim');
  document.getElementById('crumb').innerHTML=crumbs.map((c,i)=>i===crumbs.length-1?`<b>${esc(c)}</b>`:esc(c)).join('  ›  ');
}
function clearTrace(){ document.getElementById('pan').classList.remove('dim');
  document.querySelectorAll('.node.onpath').forEach(e=>e.classList.remove('onpath'));
  document.querySelectorAll('#edges path.hl').forEach(e=>e.classList.remove('hl'));
  document.getElementById('crumb').textContent='Click any node to trace it up to its root Value.'; }

/* pan + zoom */
let scale=1,tx=20,ty=20,dragging=false,sx=0,sy=0;
const pan=document.getElementById('pan'), vp=document.getElementById('viewport');
const apply=()=>pan.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
vp.addEventListener('mousedown',e=>{ if(e.target.closest('.node'))return; dragging=true; vp.classList.add('drag'); sx=e.clientX-tx; sy=e.clientY-ty; });
window.addEventListener('mouseup',()=>{ dragging=false; vp.classList.remove('drag'); });
window.addEventListener('mousemove',e=>{ if(dragging){ tx=e.clientX-sx; ty=e.clientY-sy; apply(); } });
vp.addEventListener('wheel',e=>{ e.preventDefault(); const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const d=e.deltaY<0?1.1:1/1.1, ns=Math.min(2.5,Math.max(0.12,scale*d));
  tx=mx-(mx-tx)*(ns/scale); ty=my-(my-ty)*(ns/scale); scale=ns; apply(); },{passive:false});
function fit(){ const vr=vp.getBoundingClientRect(); if(!CW||!CH)return;
  const sW=(vr.width-24)/CW, sH=(vr.height-24)/CH;
  // fill the available space: scale to the larger axis, center; pan the overflowing axis
  scale=Math.min(2.4, Math.max(0.10, Math.max(sW,sH))); if(!isFinite(scale)||scale<=0)scale=1;
  const w=CW*scale, h=CH*scale;
  tx = w<=vr.width ? (vr.width-w)/2 : 14;
  ty = h<=vr.height ? (vr.height-h)/2 : 14;
  apply(); }
window.addEventListener('resize',()=>{ clearTimeout(window.__rf); window.__rf=setTimeout(fit,120); });

document.getElementById('fit').onclick=fit;
document.getElementById('zin').onclick=()=>{ scale=Math.min(2.5,scale*1.15); apply(); };
document.getElementById('zout').onclick=()=>{ scale=Math.max(0.12,scale/1.15); apply(); };
document.getElementById('clear').onclick=clearTrace;
document.getElementById('refresh').onclick=load;
document.getElementById('expand').onclick=()=>{ collapsed.clear(); render(); };
document.getElementById('collapse').onclick=()=>{ collapsed.clear();
  (function w(n){ if(n.kind==='Project'||n.kind==='Bucket'){ if(n.children.some(c=>c.kind==='Task')) collapsed.add(n.uid); } n.children.forEach(w); })({children:ROOTS,kind:'root'}); render(); };
load();
</script>
